<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal</title>
    <style>
        body { margin: 0; background: #020617; color: #7dd3fc; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        #s { font-weight: 800; letter-spacing: 1px; text-transform: uppercase; animation: p 1.2s ease-in-out infinite; font-size: 14px; }
        @keyframes p { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.98); } }
        iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: #020617; }
    </style>
</head>
<body>
    <div id="s">Loading..</div>
    <iframe id="f" src="about:blank" sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation allow-downloads" allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <script>
        (function() {
            const URL = "https://cdn.jsdelivr.net/gh/Willyy2/portal-os@main/index.html";
            const frame = document.getElementById('f');
            const status = document.getElementById('s');

            // Start fetch immediately without waiting for window.onload
            const fetchPromise = fetch(`${URL}?t=${Date.now()}`).then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            });

            async function boot() {
                try {
                    const code = await fetchPromise;
                    const doc = frame.contentWindow.document;
                    
                    doc.open();
                    doc.write(code);
                    doc.close();

                    // Smooth transition
                    frame.style.display = 'block';
                    status.style.display = 'none';
                } catch (e) {
                    status.innerText = "Fetch Error";
                    status.style.color = "#ff4444";
                }
            }

            // Execute as soon as the DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', boot);
            } else {
                boot();
            }
        })();
    </script>
</body>
</html>
